version: '3.8'

services:
  solitaire:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: windows-solitaire
    ports:
      - "8080:80"
    restart: unless-stopped
    
    # Optional: Add healthcheck
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
